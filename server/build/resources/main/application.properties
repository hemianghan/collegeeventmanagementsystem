spring.application.name=college-event-management
spring.datasource.url=jdbc:h2:file:./data/eventdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=false
spring.jpa.hibernate.ddl-auto=update

# Disable caching for static resources during development
spring.resources.cache.period=0
spring.web.resources.cache.period=0
spring.mvc.static-path-pattern=/**
spring.resources.static-locations=file:src/main/resources/static/,classpath:/static/
spring.web.resources.add-mappings=true

